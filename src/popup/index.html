<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthyTurtle</title>
  </head>
  <body>
    <main class="popup">
      <header>
        <p class="eyebrow">HealthyTurtle</p>
        <h1>Your food-label preferences</h1>
        <p class="intro">Choose what to surface while you browse supported product pages.</p>
      </header>

      <form id="preferences-form">
        <div id="preference-list" class="preference-list"></div>
        <button type="submit">Save preferences</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
